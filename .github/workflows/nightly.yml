name: Nightly Comprehensive Tests

on:
  schedule:
    - cron: '0 7 * * *'  # 2 AM EST (7 AM UTC) - runs daily on main branch
  
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to test (default: main)'
        required: false
        default: 'main'
        type: string

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false  # Let nightly runs complete

jobs:
  sanity:
    name: Sanity Check
    uses: ./.github/workflows/sanity-check.yml
    with:
      ref: ${{ inputs.ref || 'main' }}

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          node-version: '20'

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  build:
    name: Build
    needs: sanity
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ inputs.ref || 'main' }}

  e2e-comprehensive:
    name: Comprehensive E2E Tests
    needs: [quality, build]
    uses: ./.github/workflows/test-e2e-full.yml
    with:
      shards: '2'
      browsers: 'chromium,firefox,webkit'

  summary:
    name: Nightly Test Summary
    if: always()
    needs: [sanity, quality, build, e2e-comprehensive]
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          {
            echo "# 🌙 Nightly Test Results"
            echo ""
            echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')"
            echo "**Branch:** ${{ inputs.ref || 'main' }}"
            echo ""
            echo "## Job Status"
            echo "| Job | Status |"
            echo "| --- | --- |"
            echo "| Sanity | ${{ needs.sanity.result }} |"
            echo "| Quality | ${{ needs.quality.result }} |"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| E2E Comprehensive | ${{ needs.e2e-comprehensive.result }} |"
            echo ""
            
            if [ "${{ needs.e2e-comprehensive.result }}" = "success" ]; then
              echo "✅ All nightly tests passed!"
            else
              echo "⚠️ Some tests failed. Please review the logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "Nightly tests failed. Consider adding notification integration here."
          # Future: Add Slack/Discord/Email notification
