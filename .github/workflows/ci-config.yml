name: CI Config

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '*.config.js'
      - '.github/workflows/**'
      - '.github/workflows/ci-config.yml'

concurrency:
  group: ci-config-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  config_validation:
    name: Validate configuration files
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'

      - name: Validate package.json schema
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json is valid JSON')"

      - name: Check lockfile consistency
        run: npm ci --ignore-scripts --dry-run
        # --ignore-scripts prevents running postinstall/prepare scripts during validation
        # to isolate lockfile consistency check from script execution issues

      - name: Lint JavaScript config files
        run: |
          config_files=$(find . -maxdepth 1 -name '*.config.js' -print)
          if [ -n "$config_files" ]; then
            npx eslint $config_files
          else
            echo "No root *.config.js files found"
          fi

      - name: Validate workflow YAML syntax
        uses: rhysd/actionlint@v1.7.4
        continue-on-error: true
        with:
          # Shellcheck warnings are informational only and won't fail the workflow
          flags: -ignore 'SC.*'

      - name: Config summary
        run: |
          {
            echo "## Config CI Summary"
            echo "- package.json validation: passed"
            echo "- dependency consistency: passed"
            echo "- config linting: passed"
            echo "- workflow syntax validation: passed (shellcheck informational only)"
            echo "- code tests: not run by design"
          } >> "$GITHUB_STEP_SUMMARY"
