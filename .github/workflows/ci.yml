name: CI

on:
  pull_request:
    branches: [trunk]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity Check
    uses: ./.github/workflows/sanity-check.yml

  quality:
    name: Lint + Unit tests
    runs-on: ubuntu-latest
    needs: sanity
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          node-version: "22"

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Security audit
        # Fail CI on high or critical vulnerabilities.
        # Remove --audit-level=high to enforce all severity levels.
        run: npm audit --production --audit-level=high

      - name: Check for unused dependencies
        run: npm run depcheck

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

  build:
    name: Build
    needs: sanity
    permissions: {}
    uses: ./.github/workflows/build.yml

