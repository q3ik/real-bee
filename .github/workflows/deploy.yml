name: Deploy

on:
  push:
    branches:
      - trunk
    paths-ignore:
      - "**/*.md"
      - "docs/**"

  #pull_request:
  #  paths-ignore:
  #    - "**/*.md"
  #    - "docs/**"

  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml

  # deploy-preview:
